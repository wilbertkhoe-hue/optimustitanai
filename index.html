<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITAN V7</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body class="bg-[#0b0f1a] text-white font-sans">

<div class="p-4 space-y-4">

<!-- TOP BAR -->
<div class="grid grid-cols-4 gap-4">
  <div class="bg-[#121826] p-4 rounded-xl">BTC: <span id="btcPrice">...</span></div>
  <div class="bg-[#121826] p-4 rounded-xl">GOLD: <span id="goldPrice">...</span></div>
  <div class="bg-[#121826] p-4 rounded-xl">STATUS: <span id="status">BTC MODE</span></div>
  <div class="bg-[#121826] p-4 rounded-xl">SIGNAL: <span id="signalBox">...</span></div>
</div>

<!-- ✅ TAMBAHAN MACRO (TANPA NGUBAH YANG LAIN) -->
<div class="grid grid-cols-6 gap-4">

  <div class="bg-[#121826] p-3 rounded-xl text-xs">
    Inflasi<br><span id="inflation">...</span>
  </div>

  <div class="bg-[#121826] p-3 rounded-xl text-xs">
    Suku Bunga<br><span id="rate">...</span>
  </div>

  <div class="bg-[#121826] p-3 rounded-xl text-xs">
    DXY<br><span id="dxy">...</span>
  </div>

  <div class="bg-[#121826] p-3 rounded-xl text-xs">
    VIX<br><span id="vix">...</span>
  </div>

  <div class="bg-[#121826] p-3 rounded-xl text-xs">
    S&P500<br><span id="sp500">...</span>
  </div>

  <div class="bg-[#121826] p-3 rounded-xl text-xs">
    Fear & Greed<br><span id="feargreed">...</span>
  </div>

</div>

<!-- MAIN -->
<div class="grid grid-cols-3 gap-4">

<!-- LEFT -->
<div class="col-span-2 space-y-4">

<!-- CHART -->
<div class="bg-[#121826] p-4 rounded-xl">
  <div id="tradingview_chart"></div>
</div>

<!-- BUTTON -->
<div class="flex gap-2">
  <button onclick="switchAsset('BTC')" class="bg-green-600 px-4 py-2 rounded">BTC</button>
  <button onclick="switchAsset('GOLD')" class="bg-yellow-600 px-4 py-2 rounded">GOLD</button>
</div>

</div>

<!-- CHAT -->
<div class="bg-[#121826] p-4 rounded-xl flex flex-col">
  <div id="chatbox" class="flex-1 overflow-y-auto text-sm mb-2"></div>
  <div class="flex gap-2">
    <input id="input" class="flex-1 p-2 bg-black border border-gray-600 rounded">
    <button onclick="send()" class="bg-indigo-600 px-3 rounded">Kirim</button>
  </div>
</div>

</div>

<!-- AI RESULT -->
<div class="bg-[#121826] p-4 rounded-xl">
  <h2>🎯 AI Prediction</h2>
  <pre id="prediction" class="text-xs"></pre>
</div>

<!-- SENTIMENT + NEWS -->
<div class="grid grid-cols-2 gap-4">
  <div class="bg-[#121826] p-4 rounded-xl">
    <h2>📊 Sentiment</h2>
    <div id="sentimentBar"></div>
  </div>
  <div class="bg-[#121826] p-4 rounded-xl">
    <h2>📰 News</h2>
    <div id="newsList"></div>
  </div>
</div>

</div>

<script>

// ================= CHART =================
let currentSymbol = "BINANCE:BTCUSDT";

function loadChart(symbol){
  document.getElementById("tradingview_chart").innerHTML = "";
  new TradingView.widget({
    container_id: "tradingview_chart",
    width: "100%",
    height: 400,
    symbol: symbol,
    interval: "60",
    theme: "dark"
  });
}

loadChart(currentSymbol);

// ================= SWITCH =================
function switchAsset(asset){
  if(asset === "BTC"){
    currentSymbol = "BINANCE:BTCUSDT";
    document.getElementById("status").innerText = "BTC MODE";
    loadChart(currentSymbol);
    analisis("BTC-USD");
  }

  if(asset === "GOLD"){
    currentSymbol = "OANDA:XAUUSD";
    document.getElementById("status").innerText = "GOLD MODE";
    loadChart(currentSymbol);
    analisis("GC=F");
  }
}

// ================= MARKET =================
async function loadMarket(){
  try{
    let btc = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
    let data = await btc.json();
    document.getElementById("btcPrice").innerText = "$" + data.bitcoin.usd;
  }catch{}
}
setInterval(loadMarket,5000);
loadMarket();

// ================= ANALISIS =================
async function analisis(asset){
  document.getElementById("prediction").innerText = "Loading AI...";

  let res = await fetch("/proses",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({mode:"ANALISIS", asset:asset})
  });

  let data = await res.json();

  document.getElementById("prediction").innerText = data.reply;
  document.getElementById("signalBox").innerText = data.signal;
}

// ================= CHAT =================
async function send(){
  let input = document.getElementById("input");
  let msg = input.value;
  if(!msg) return;

  add("YOU", msg);
  input.value="";

  let res = await fetch("/proses",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({mode:"CHAT", message:msg})
  });

  let data = await res.json();

  add("TITAN", data.reply);

  document.getElementById("sentimentBar").innerText =
    "Score: " + data.sentiment + "%";

  let newsHTML = "";
  data.news.forEach(n => {
    newsHTML += `<div class="text-xs">📰 ${n}</div>`;
  });
  document.getElementById("newsList").innerHTML = newsHTML;
}

function add(sender,text){
  let box = document.getElementById("chatbox");
  box.innerHTML += `<div><b>${sender}:</b> ${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

// ================= ✅ MACRO ADD-ON =================
async function loadMacroAddon(){

  // ================= FEAR & GREED =================
  try{
    let fg = await fetch("https://api.alternative.me/fng/");
    let data = await fg.json();

    document.getElementById("feargreed").innerText =
      data.data[0].value + " (" + data.data[0].value_classification + ")";
  }catch(e){
    console.log("FG ERROR", e);
  }

  // ================= S&P500 =================
  try{
let sp = await fetch("https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EGSPC");
let d = await sp.json();

document.getElementById("sp500").innerText =
  d.quoteResponse.result?.[0]?.regularMarketPrice ?? "N/A";
  }catch(e){
    console.log("SP500 ERROR", e);
  }

  // ================= VIX =================
  try{
let vix = await fetch("https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EVIX");
let d = await vix.json();

document.getElementById("vix").innerText =
  d.quoteResponse.result?.[0]?.regularMarketPrice ?? "N/A";
  }catch(e){
    console.log("VIX ERROR", e);
  }

  // ================= DXY =================
  try{
let dxy = await fetch("https://query1.finance.yahoo.com/v7/finance/quote?symbols=DX-Y.NYB");
let d = await dxy.json();

document.getElementById("dxy").innerText =
  d.quoteResponse.result?.[0]?.regularMarketPrice ?? "N/A";
  }catch(e){
    console.log("DXY ERROR", e);
  }

  // ================= MACRO (FRED - FIXED CALL) =================
  try{
    let res = await fetch("/macro");
    let data = await res.json();

    console.log("MACRO:", data);

    document.getElementById("rate").innerText =
      data.rate !== null ? data.rate + "%" : "N/A";

    document.getElementById("inflation").innerText =
      data.inflation !== null ? data.inflation : "N/A";

  }catch(e){
    console.log("MACRO ERROR", e);
  }
}

setInterval(loadMacroAddon,15000);
loadMacroAddon();
</script>

</body>
</html>
